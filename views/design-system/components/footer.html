{% extends "layout.html" %}

{% block title %}
Header
{% endblock %}

{% block pageTitle %}
<span class="govuk-caption-xl">Components</span>
<h1 class="govuk-heading-xl govuk-!-margin-bottom-2">Footer</h1>
<strong class="govuk-tag govuk-tag--orange">To be reviewed</strong>
{% endblock %}

{% block content %}
<div class="fcdo-component">
    <div class="fcdo-component__tabs">
        <div class="govuk-tabs" data-module="govuk-tabs">
            <h2 class="govuk-tabs__title">
                Contents
            </h2>
            <ul class="govuk-tabs__list">
                <li class="govuk-tabs__list-item govuk-tabs__list-item--selected">
                    <a class="govuk-tabs__tab" href="#example">
                        Example
                    </a>
                </li>
                <li class="govuk-tabs__list-item">
                    <a class="govuk-tabs__tab" href="#html">
                        HTML
                    </a>
                </li>
            </ul>

            <div class="govuk-tabs__panel" id="example">
                {% include "includes/component-html/footer.html" %}
            </div>

            <div class="govuk-tabs__panel govuk-tabs__panel--hidden" id="html">
                <button class="fcdo-button fcdo-button--outline" type="button" onclick="copyCode()" id="copyHTML">Copy code</button>
                <pre class="language-html"><code class="language-html" id="htmlCode"></code></pre>
            </div>
        </div>
    </div>
</div>
{% endblock %}
