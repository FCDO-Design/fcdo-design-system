<div class="fcdo-table-module" data-module="fcdo-sortable-table">
    <div class="govuk-form-group">
        <label class="govuk-label" for="textInput">
            Search
        </label>
        <input class="govuk-input govuk-input--width-20 fcdo-input fcdo-sortable-table__search" id="textInput" name="textInput" type="text" placeholder="Search table">
    </div>

    <table class="fcdo-table fcdo-sortable-table">
        <caption class="fcdo-table__caption">Example dataset of people, ages, and countries</caption>
        <thead class="fcdo-table__head">
            <tr class="fcdo-table__row">
                <th scope="col" tabindex="0" role="button" aria-sort="none" class="fcdo-table__header">Name</th>
                <th scope="col" tabindex="0" role="button" aria-sort="none" class="fcdo-table__header">Age</th>
                <th scope="col" tabindex="0" role="button" aria-sort="none" class="fcdo-table__header">Country</th>
            </tr>
        </thead>
        <tbody class="fcdo-table__body">
            <tr class="fcdo-table__row">
                <td class="fcdo-table__cell">Alice</td>
                <td class="fcdo-table__cell">25</td>
                <td class="fcdo-table__cell">UK</td>
            </tr>
            <tr class="fcdo-table__row">
                <td class="fcdo-table__cell">Bob</td>
                <td class="fcdo-table__cell">30</td>
                <td class="fcdo-table__cell">USA</td>
            </tr>
            <tr class="fcdo-table__row">
                <td class="fcdo-table__cell">Charlie</td>
                <td class="fcdo-table__cell">22</td>
                <td class="fcdo-table__cell">Canada</td>
            </tr>
            <tr class="fcdo-table__row">
                <td class="fcdo-table__cell">David</td>
                <td class="fcdo-table__cell">35</td>
                <td class="fcdo-table__cell">Australia</td>
            </tr>
            <tr class="fcdo-table__row">
                <td class="fcdo-table__cell">Eva</td>
                <td class="fcdo-table__cell">28</td>
                <td class="fcdo-table__cell">Germany</td>
            </tr>
        </tbody>
    </table>
</div>
