<div class="govuk-form-group">
  <fieldset class="govuk-fieldset">
    <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
      <h1 class="govuk-fieldset__heading">
        Where do you live?
      </h1>
    </legend>
    <div class="{% if radiosSmall %}govuk-radios govuk-radios--small fcdo-radios{% else %}govuk-radios fcdo-radios{% endif %}" data-module="govuk-radios">
      <div class="govuk-radios__item">
        <input class="govuk-radios__input fcdo-radios__input" id="whereDoYouLive{% if radiosSmall %}-small{%endif%}" name="whereDoYouLive{% if radiosSmall %}-small{%endif%}" type="radio" value="england">
        <label class="govuk-label govuk-radios__label fcdo-radios__label" for="whereDoYouLive{% if radiosSmall %}-small{%endif%}">
          England
        </label>
      </div>
      <div class="govuk-radios__item">
        <input class="govuk-radios__input fcdo-radios__input" id="whereDoYouLive-2{% if radiosSmall %}-small{%endif%}" name="whereDoYouLive{% if radiosSmall %}-small{%endif%}" type="radio" value="scotland">
        <label class="govuk-label govuk-radios__label fcdo-radios__label" for="whereDoYouLive-2{% if radiosSmall %}-small{%endif%}">
          Scotland
        </label>
      </div>
      <div class="govuk-radios__item">
        <input class="govuk-radios__input fcdo-radios__input" id="whereDoYouLive-3{% if radiosSmall %}-small{%endif%}" name="whereDoYouLive{% if radiosSmall %}-small{%endif%}" type="radio" value="wales">
        <label class="govuk-label govuk-radios__label fcdo-radios__label" for="whereDoYouLive-3{% if radiosSmall %}-small{%endif%}">
          Wales
        </label>
      </div>
      <div class="govuk-radios__item">
        <input class="govuk-radios__input fcdo-radios__input" id="whereDoYouLive-4{% if radiosSmall %}-small{%endif%}" name="whereDoYouLive{% if radiosSmall %}-small{%endif%}" type="radio" value="northern-ireland">
        <label class="govuk-label govuk-radios__label fcdo-radios__label" for="whereDoYouLive-4{% if radiosSmall %}-small{%endif%}">
          Northern Ireland
        </label>
      </div>
    </div>
  </fieldset>
</div>
