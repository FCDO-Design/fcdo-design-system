<!DOCTYPE html>
<html lang="en" class="govuk-template fcdo-template" data-theme="">
<head>
    <meta charset="utf-8">
    <title>
        {% block title %}{% endblock %}
    </title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1d70b8">
    <link rel="icon" sizes="48x48" href="/assets/rebrand/images/favicon.ico">
    <link rel="icon" sizes="any" href="/assets/rebrand/images/favicon.svg" type="image/svg+xml">
    <link rel="mask-icon" href="/assets/rebrand/images/govuk-icon-mask.svg" color="#1d70b8">
    <link rel="apple-touch-icon" href="/assets/rebrand/images/govuk-icon-180.png">
    <link rel="manifest" href="/assets/rebrand/manifest.json">
    <link rel="stylesheet" href="/assets/css/fcdo-design-system.min.css">
    <link rel="stylesheet" href="/assets/css/fcdo-frontend.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="govuk-template__body fcdo-template__body">
    <script type="module" src="/assets/javascript/govuk-frontend.min.js"></script>
    <script type="module">
        import { initAll } from '/assets/javascript/govuk-frontend.min.js'
        initAll()
    </script>
    <script>
        document.body.className += ' js-enabled' + ('noModule' in HTMLScriptElement.prototype ? ' govuk-frontend-supported' : '');
    </script>
    <script type="module" src="/assets/javascript/fcdo-frontend.min.js"></script>

    <a href="#main-content" class="govuk-skip-link" data-module="govuk-skip-link">Skip to main content</a>

    {% block content %}{% endblock %}

    <script src="/assets/javascript/fcdo-design-system.min.js"></script>
</body>
</html>
