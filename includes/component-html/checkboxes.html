<div class="govuk-form-group">
  <fieldset class="govuk-fieldset">
    <legend class="govuk-fieldset__legend govuk-fieldset__legend--m">
      <h1 class="govuk-fieldset__heading">
        Select organisation
      </h1>
    </legend>
    <div class="govuk-checkboxes fcdo-checkboxes" data-module="govuk-checkboxes">
      <div class="govuk-checkboxes__item fcdo-checkboxes__item">
        <input class="govuk-checkboxes__input fcdo-checkboxes__input" id="organisation" name="organisation" type="checkbox" value="fcdo">
        <label class="govuk-label govuk-checkboxes__label fcdo-checkboxes__label" for="organisation">
          Foreign Commonwelath and Development Office
        </label>
      </div>
      <div class="govuk-checkboxes__item fcdo-checkboxes__item">
        <input class="govuk-checkboxes__input fcdo-checkboxes__input" id="organisation-2" name="organisation" type="checkbox" value="dot">
        <label class="govuk-label govuk-checkboxes__label fcdo-checkboxes__label" for="organisation-2">
          Department for Transport
        </label>
      </div>
      <div class="govuk-checkboxes__item fcdo-checkboxes__item">
        <input class="govuk-checkboxes__input fcdo-checkboxes__input" id="organisation-3" name="organisation" type="checkbox" value="hmrc">
        <label class="govuk-label govuk-checkboxes__label fcdo-checkboxes__label" for="organisation-3">
          HM Revenue and Customs (HMRC)
        </label>
      </div>
    </div>
  </fieldset>
</div>
